<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Predictor</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;

            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;

            border: 1px solid #ccc;
            border-radius: 8px;

            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;

            background: #1e3c72;
            color: white;

            border: none;
            border-radius: 8px;

            font-size: 16px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background: #16325c;
        }

        .result {
            margin-top: 25px;
            padding: 15px;

            background: #f2f6ff;
            border-radius: 10px;
        }

        .result h2 {
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .result h3 {
            margin-bottom: 8px;
            color: #333;
        }

        .result p {
            color: #555;
            line-height: 1.5;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Student Score Predictor</h1>

        <form action="/predict" method="post">

            <label>Study Hours</label>
            <input type="number" name="study"
                min="0" max="24" required>

            <label>Sleep Hours</label>
            <input type="number" name="sleep"
                min="0" max="24" required>

            <label>Previous Score</label>
            <input type="number" name="previous"
                min="0" max="100" required>

            <button type="submit">Predict</button>

        </form>

        <div class="result">

            <h2>{{ prediction_text }}</h2>

            <h3>AI Advice</h3>

            <p>{{ advice_text }}</p>

        </div>

    </div>

</body>

</html>
